services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: iot
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./data/iot_telemetry_data.csv:/data/iot_telemetry_data.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot"]
      interval: 5s
      timeout: 5s
      retries: 10

  rest-service:
    build: ./rest-service
    container_name: iot-rest
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=iot;Username=iot_user;Password=iot_pass"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
